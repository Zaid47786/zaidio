    <script>
      // Intro: show only the rain for 3s
      document.body.classList.add('intro');
      setTimeout(() => document.body.classList.remove('intro'), 3000);

      (function () {
        const canvas = document.getElementById('code-rain');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let width, height, columns, drops, fontSize;

        function resize() {
          width = canvas.width = window.innerWidth;
          height = canvas.height = window.innerHeight;
          fontSize = 16;
          columns = Math.floor(width / fontSize);
          drops = Array.from({ length: columns }, () => Math.random() * (height / fontSize));
          ctx.font = fontSize + 'px VT323, monospace';
        }

        const chars = 'アカサタナハマヤラワ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';

        function draw() {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
          ctx.fillRect(0, 0, width, height);
          for (let i = 0; i < columns; i++) {
            const char = chars[Math.floor(Math.random() * chars.length)];
            const x = i * fontSize;
            const y = drops[i] * fontSize;
            const isAccent = (i % 23 === 0);
            ctx.fillStyle = isAccent ? 'rgba(255,53,94,0.85)' : 'rgba(57,255,20,0.9)';
            ctx.shadowColor = ctx.fillStyle;
            ctx.shadowBlur = 8;
            ctx.fillText(char, x, y);
            if (y > height && Math.random() > 0.975) {
              drops[i] = 0;
            } else {
              drops[i] += 1;
            }
          }
          ctx.shadowBlur = 0;
          requestAnimationFrame(draw);
        }

        resize();
        window.addEventListener('resize', resize);
        const reduce = window.matchMedia('(prefers-reduced-motion: reduce)');
        if (!reduce.matches) requestAnimationFrame(draw);
      })();

      // Ripple effect for social links
      document.addEventListener('click', function (e) {
        const link = e.target.closest('.social-link');
        if (!link) return;
        const rect = link.getBoundingClientRect();
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        ripple.style.left = (e.clientX - rect.left) + 'px';
        ripple.style.top  = (e.clientY - rect.top) + 'px';
        link.appendChild(ripple);
        setTimeout(() => ripple.remove(), 700);
      }, { passive: true });

      // Pause animations when tab hidden
      document.addEventListener('visibilitychange', function () {
        document.body.toggleAttribute('data-paused', document.hidden);
      });

      // Typewriter effect for skills when in view
      (function () {
        const items = Array.from(document.querySelectorAll('.typewriter'));
        if (!items.length) return;
        const originalTexts = items.map(el => el.textContent);
        items.forEach(el => el.textContent = '');

        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const el = entry.target;
              const idx = items.indexOf(el);
              const text = originalTexts[idx] || '';
              if (el.dataset.typed) return;
              el.dataset.typed = '1';
              let i = 0;
              const interval = setInterval(() => {
                el.textContent = text.slice(0, i++);
                if (i > text.length) clearInterval(interval);
              }, 35 + Math.random() * 40);
              observer.unobserve(el);
            }
          });
        }, { threshold: 0.2 });

        items.forEach(el => observer.observe(el));
      })();
    </script>
